name: Release

# Builds a signed release APK and attaches it to a GitHub Release.
# Trigger by pushing a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`),
# or run it manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so we can diff against the previous release tag.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Most recent tag reachable before this one (the previous release), if any.
          prev="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          {
            # Annotated-tag message, if the tag carries one (empty for lightweight tags).
            msg="$(git tag -l --format='%(contents)' "$TAG")"
            if [ -n "$msg" ]; then
              printf '%s\n\n' "$msg"
            fi
            echo "## Changes"
            if [ -n "$prev" ]; then
              git log --no-merges --pretty='- %s (%h)' "${prev}..${TAG}"
              printf '\n**Full changelog**: %s/%s/compare/%s...%s\n' \
                "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$prev" "$TAG"
            else
              git log --no-merges --pretty='- %s (%h)' "$TAG"
            fi
          } > release-notes.md
          echo "----- release-notes.md -----"
          cat release-notes.md

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          body_path: release-notes.md
